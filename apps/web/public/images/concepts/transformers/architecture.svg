<svg viewBox="0 0 720 1060" xmlns="http://www.w3.org/2000/svg" font-family="ui-sans-serif, -apple-system, 'Segoe UI', sans-serif" role="img" aria-label="Architecture of the demo transformer: characters are embedded, pass through three transformer blocks each containing layer norm, four-head causal attention, and an MLP with residual connections, then a final layer norm and tied unembedding produce a probability distribution over 65 characters.">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 1 L 9 5 L 0 9" fill="none" stroke="#5f5a53" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- input characters -->
  <g font-size="15" fill="#1f1c19" text-anchor="middle">
    <g font-family="ui-monospace, 'Cascadia Mono', monospace">
      <rect x="216" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="233" y="40">R</text>
      <rect x="256" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="273" y="40">O</text>
      <rect x="296" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="313" y="40">M</text>
      <rect x="336" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="353" y="40">E</text>
      <rect x="376" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="393" y="40">O</text>
      <rect x="416" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="433" y="40">:</text>
      <rect x="456" y="18" width="34" height="34" rx="6" fill="none" stroke="#d8d3ca" stroke-width="1.4"/>
      <text x="473" y="40">␣</text>
    </g>
    <text x="530" y="40" fill="#5f5a53" font-size="13" text-anchor="start">up to T = 64 characters</text>
  </g>

  <line x1="360" y1="58" x2="360" y2="88" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="374" y="78" font-size="13" fill="#5f5a53">token ids, integers in 0..64</text>

  <!-- embeddings -->
  <rect x="170" y="92" width="380" height="64" rx="8" fill="none" stroke="#0f766e" stroke-width="1.8"/>
  <text x="360" y="118" font-size="14" fill="#1f1c19" text-anchor="middle">token embedding  W_E  (65 × 96)</text>
  <text x="360" y="140" font-size="14" fill="#1f1c19" text-anchor="middle">+  position embedding  W_P  (64 × 96)</text>

  <line x1="360" y1="160" x2="360" y2="196" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="374" y="184" font-size="13" fill="#5f5a53">X  (64 × 96)</text>

  <!-- transformer block -->
  <rect x="120" y="200" width="480" height="530" rx="12" fill="none" stroke="#d8d3ca" stroke-width="1.8"/>
  <text x="140" y="228" font-size="13" fill="#5f5a53" letter-spacing="1" style="text-transform:uppercase">TRANSFORMER BLOCK</text>

  <!-- ×3 bracket -->
  <path d="M 614 208 h 14 v 514 h -14" fill="none" stroke="#5f5a53" stroke-width="1.4"/>
  <text x="646" y="470" font-size="15" fill="#1f1c19">× 3</text>

  <!-- residual path 1: from block input down to first plus -->
  <path d="M 360 200 v 14 h -204 v 288 h 190" fill="none" stroke="#d8d3ca" stroke-width="1.6" marker-end="url(#arrow)"/>
  <text x="150" y="330" font-size="12" fill="#5f5a53" transform="rotate(-90 150 330)">residual (identity)</text>

  <!-- LN1 -->
  <rect x="250" y="240" width="220" height="34" rx="7" fill="none" stroke="#d8d3ca" stroke-width="1.5"/>
  <text x="360" y="262" font-size="14" fill="#1f1c19" text-anchor="middle">LayerNorm</text>
  <line x1="360" y1="274" x2="360" y2="296" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- QKV -->
  <rect x="205" y="300" width="310" height="34" rx="7" fill="none" stroke="#0f766e" stroke-width="1.6"/>
  <text x="360" y="322" font-size="14" fill="#1f1c19" text-anchor="middle">W_QKV  (96 → 288), split into Q, K, V</text>
  <line x1="360" y1="334" x2="360" y2="356" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- heads -->
  <g font-size="12.5" fill="#1f1c19" text-anchor="middle">
    <rect x="205" y="360" width="70" height="50" rx="7" fill="#0f766e" fill-opacity="0.07" stroke="#0f766e" stroke-width="1.4"/>
    <text x="240" y="381">head 1</text>
    <text x="240" y="398" fill="#5f5a53">A: 64×64</text>
    <rect x="285" y="360" width="70" height="50" rx="7" fill="#0f766e" fill-opacity="0.07" stroke="#0f766e" stroke-width="1.4"/>
    <text x="320" y="381">head 2</text>
    <text x="320" y="398" fill="#5f5a53">A: 64×64</text>
    <rect x="365" y="360" width="70" height="50" rx="7" fill="#0f766e" fill-opacity="0.07" stroke="#0f766e" stroke-width="1.4"/>
    <text x="400" y="381">head 3</text>
    <text x="400" y="398" fill="#5f5a53">A: 64×64</text>
    <rect x="445" y="360" width="70" height="50" rx="7" fill="#0f766e" fill-opacity="0.07" stroke="#0f766e" stroke-width="1.4"/>
    <text x="480" y="381">head 4</text>
    <text x="480" y="398" fill="#5f5a53">A: 64×64</text>
  </g>
  <text x="530" y="390" font-size="12.5" fill="#5f5a53" text-anchor="start">d_k = 24 each,</text>
  <text x="530" y="406" font-size="12.5" fill="#5f5a53" text-anchor="start">causal mask</text>
  <line x1="360" y1="410" x2="360" y2="432" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- concat + Wo -->
  <rect x="230" y="436" width="260" height="34" rx="7" fill="none" stroke="#0f766e" stroke-width="1.6"/>
  <text x="360" y="458" font-size="14" fill="#1f1c19" text-anchor="middle">concat → W_O  (96 → 96)</text>

  <!-- plus 1 -->
  <line x1="360" y1="470" x2="360" y2="488" stroke="#5f5a53" stroke-width="1.4"/>
  <circle cx="360" cy="502" r="13" fill="none" stroke="#5f5a53" stroke-width="1.5"/>
  <text x="360" y="508" font-size="16" fill="#5f5a53" text-anchor="middle">+</text>

  <!-- residual path 2 -->
  <path d="M 360 515 v 8 h -204 v 139 h 190" fill="none" stroke="#d8d3ca" stroke-width="1.6" marker-end="url(#arrow)"/>

  <!-- LN2 -->
  <line x1="360" y1="515" x2="360" y2="536" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>
  <rect x="250" y="540" width="220" height="34" rx="7" fill="none" stroke="#d8d3ca" stroke-width="1.5"/>
  <text x="360" y="562" font-size="14" fill="#1f1c19" text-anchor="middle">LayerNorm</text>
  <line x1="360" y1="574" x2="360" y2="596" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>

  <!-- MLP -->
  <rect x="205" y="600" width="310" height="34" rx="7" fill="none" stroke="#0f766e" stroke-width="1.6"/>
  <text x="360" y="622" font-size="14" fill="#1f1c19" text-anchor="middle">W₁ (96 → 384) → GELU → W₂ (384 → 96)</text>

  <!-- plus 2 -->
  <line x1="360" y1="634" x2="360" y2="648" stroke="#5f5a53" stroke-width="1.4"/>
  <circle cx="360" cy="662" r="13" fill="none" stroke="#5f5a53" stroke-width="1.5"/>
  <text x="360" y="668" font-size="16" fill="#5f5a53" text-anchor="middle">+</text>
  <line x1="360" y1="675" x2="360" y2="700" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="374" y="695" font-size="13" fill="#5f5a53">still (64 × 96)</text>

  <!-- after blocks -->
  <line x1="360" y1="730" x2="360" y2="756" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="250" y="760" width="220" height="34" rx="7" fill="none" stroke="#d8d3ca" stroke-width="1.5"/>
  <text x="360" y="782" font-size="14" fill="#1f1c19" text-anchor="middle">final LayerNorm</text>
  <line x1="360" y1="794" x2="360" y2="816" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>

  <rect x="205" y="820" width="310" height="34" rx="7" fill="none" stroke="#0f766e" stroke-width="1.6"/>
  <text x="360" y="842" font-size="14" fill="#1f1c19" text-anchor="middle">unembedding  W_Eᵀ  (96 → 65), tied</text>
  <line x1="360" y1="854" x2="360" y2="876" stroke="#5f5a53" stroke-width="1.4" marker-end="url(#arrow)"/>
  <text x="374" y="872" font-size="13" fill="#5f5a53">logits (65), then softmax</text>

  <!-- output distribution -->
  <g font-size="13">
    <text x="298" y="905" fill="#1f1c19" font-family="ui-monospace, 'Cascadia Mono', monospace" text-anchor="end">␣</text>
    <rect x="310" y="894" width="150" height="13" rx="2.5" fill="#0f766e" fill-opacity="0.85"/>
    <text x="470" y="905" fill="#5f5a53">0.42</text>
    <text x="298" y="927" fill="#1f1c19" font-family="ui-monospace, 'Cascadia Mono', monospace" text-anchor="end">e</text>
    <rect x="310" y="916" width="78" height="13" rx="2.5" fill="#0f766e" fill-opacity="0.5"/>
    <text x="398" y="927" fill="#5f5a53">0.21</text>
    <text x="298" y="949" fill="#1f1c19" font-family="ui-monospace, 'Cascadia Mono', monospace" text-anchor="end">t</text>
    <rect x="310" y="938" width="42" height="13" rx="2.5" fill="#0f766e" fill-opacity="0.35"/>
    <text x="362" y="949" fill="#5f5a53">0.11</text>
    <text x="298" y="971" fill="#1f1c19" font-family="ui-monospace, 'Cascadia Mono', monospace" text-anchor="end">…</text>
    <rect x="310" y="960" width="20" height="13" rx="2.5" fill="#0f766e" fill-opacity="0.2"/>
  </g>

  <text x="360" y="1020" font-size="13.5" fill="#5f5a53" text-anchor="middle">every arrow is a matrix shape you can check against the parameter table</text>
</svg>
